<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rennrad Routenplaner</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-bicycle"></i>
                    <h1>Rennrad Routenplaner</h1>
                </div>
                <p class="subtitle">Entdecke neue Strecken – zufällig generiert, perfekt geplant</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Eingabe-Panel -->
            <aside class="sidebar">
                <div class="panel">
                    <h2><i class="fas fa-map-marker-alt"></i> Startort</h2>
                    <div class="input-group">
                        <label for="address">Adresse / Ort</label>
                        <div class="input-with-icon">
                            <input type="text" id="address" placeholder="z.B. Zürich Hauptbahnhof" autocomplete="off">
                            <button id="btn-locate" class="btn-icon" title="Meinen Standort verwenden">
                                <i class="fas fa-crosshairs"></i>
                            </button>
                        </div>
                        <div id="address-suggestions" class="suggestions-dropdown"></div>
                    </div>
                </div>

                <div class="panel">
                    <h2><i class="fas fa-route"></i> Streckenparameter</h2>
                    
                    <div class="input-group">
                        <label for="route-type">Routentyp</label>
                        <div class="toggle-group">
                            <button class="toggle-btn active" data-value="round" id="toggle-round">
                                <i class="fas fa-sync-alt"></i> Rundkurs
                            </button>
                            <button class="toggle-btn" data-value="point" id="toggle-point">
                                <i class="fas fa-arrow-right"></i> Punkt-zu-Punkt
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="max-distance">
                            Maximale Distanz: <span id="distance-value" class="value-display">50 km</span>
                        </label>
                        <input type="range" id="max-distance" min="10" max="250" value="50" step="5">
                        <div class="range-labels">
                            <span>10 km</span>
                            <span>250 km</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="max-elevation">
                            Maximale Höhenmeter: <span id="elevation-value" class="value-display">500 hm</span>
                        </label>
                        <input type="range" id="max-elevation" min="50" max="3000" value="500" step="50">
                        <div class="range-labels">
                            <span>50 hm</span>
                            <span>3000 hm</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Geländeprofil</label>
                        <div class="profile-group">
                            <button class="profile-btn active" data-profile="flat">
                                <div class="profile-icon">
                                    <svg viewBox="0 0 60 30" class="profile-svg">
                                        <path d="M0,25 L60,23" stroke="currentColor" stroke-width="2" fill="none"/>
                                    </svg>
                                </div>
                                <span>Flach</span>
                            </button>
                            <button class="profile-btn" data-profile="hilly">
                                <div class="profile-icon">
                                    <svg viewBox="0 0 60 30" class="profile-svg">
                                        <path d="M0,25 Q10,15 15,20 Q25,10 30,18 Q40,8 45,16 Q55,12 60,22" stroke="currentColor" stroke-width="2" fill="none"/>
                                    </svg>
                                </div>
                                <span>Hügelig</span>
                            </button>
                            <button class="profile-btn" data-profile="mountainous">
                                <div class="profile-icon">
                                    <svg viewBox="0 0 60 30" class="profile-svg">
                                        <path d="M0,28 L15,25 L30,5 L45,22 L60,25" stroke="currentColor" stroke-width="2" fill="none"/>
                                    </svg>
                                </div>
                                <span>Bergig</span>
                            </button>
                        </div>
                    </div>
                </div>

                <button id="btn-generate" class="btn-primary">
                    <i class="fas fa-dice"></i> Routen generieren
                </button>

                <!-- Ergebnisse -->
                <div id="results-panel" class="panel results-panel" style="display:none;">
                    <h2><i class="fas fa-list-ol"></i> Routenvorschläge</h2>
                    <div id="route-list" class="route-list"></div>
                </div>
            </aside>

            <!-- Karte & Höhenprofil -->
            <section class="map-section">
                <div id="map" class="map-container"></div>
                <div id="elevation-chart-container" class="elevation-container" style="display:none;">
                    <h3><i class="fas fa-mountain"></i> Höhenprofil</h3>
                    <canvas id="elevation-chart"></canvas>
                </div>
            </section>
        </main>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay" style="display:none;">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="loading-text">Routen werden berechnet...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/gpx.js"></script>
    <script src="js/elevation.js"></script>
    <script src="js/routing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
