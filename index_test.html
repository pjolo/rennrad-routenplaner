<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Roulette V5 - Asphalt & Arrows</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map { height: 500px; width: 100%; background: #1a1a1a; border-radius: 15px; }
        .stats-box { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-4">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter uppercase">Roadie Route Generator</h1>
            <p class="text-slate-400 mt-2">Pfeile zeigen die Richtung • Filter für Asphalt • Korrekte Hm</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <div class="lg:col-span-1">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">ORS API Key</label>
                    <input id="apiKey" type="password" placeholder="Key einfügen" class="w-full bg-slate-900 border border-slate-700 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Startort</label>
                    <input id="startAddr" type="text" placeholder="z.B. Köln" class="w-full bg-slate-900 border border-slate-700 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">KM & Max Hm</label>
                    <div class="flex gap-2">
                        <input id="maxDist" type="number" value="60" class="w-20 bg-slate-900 border border-slate-700 p-2.5 rounded-lg">
                        <input id="maxElev" type="number" value="300" class="w-20 bg-slate-900 border border-slate-700 p-2.5 rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Belag</label>
                    <select id="surfaceType" class="w-full bg-slate-900 border border-slate-700 p-2.5 rounded-lg outline-none">
                        <option value="all">Egal (Mix)</option>
                        <option value="asphalt" selected>Nur Asphalt</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="initRoute()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg transition transform active:scale-95 shadow-lg">
                        GO 🚀
                    </button>
                </div>
            </div>
            <div id="status" class="mt-4 text-center text-xs font-mono text-blue-400 hidden">Bereit...</div>
        </div>

        <div id="map" class="shadow-inner border border-slate-700"></div>

        <div id="results" class="hidden mt-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="stats-box p-6 rounded-2xl border border-blue-500/20 col-span-1 flex flex-col justify-center items-center text-center">
                <div class="text-4xl font-black text-white" id="distDisplay">0 km</div>
                <div class="text-blue-400 font-bold text-xl mt-2" id="elevDisplay">0 Hm</div>
                <button onclick="downloadGPX()" class="mt-6 bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold uppercase text-sm tracking-widest transition shadow-lg">
                    GPX Speichern
                </button>
            </div>
            <div class="stats-box p-6 rounded-2xl border border-slate-700 col-span-2">
                <canvas id="elevationChart" height="120"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
    <script src="https://unpkg.com/togpx/togpx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        let map = L.map('map').setView([51.1, 10.4], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let routeLayer, chartInstance, currentGeoJSON;
        let attempt = 0;

        function initRoute() {
            attempt = 0;
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            if (routeLayer) map.removeLayer(routeLayer);
            generate();
        }

        async function generate() {
            attempt++;
            const key = document.getElementById('apiKey').value;
            const addr = document.getElementById('startAddr').value;
            const dist = document.getElementById('maxDist').value;
            const maxHm = parseInt(document.getElementById('maxElev').value);
            const surface = document.getElementById('surfaceType').value;
            const statusLabel = document.getElementById('status');

            if (!key) return alert("Bitte API Key eingeben!");

            statusLabel.innerText = `[VERSUCH ${attempt}] Route wird berechnet...`;

            try {
                // 1. Geocoding
                const gRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
                const gData = await gRes.json();
                if (!gData.length) throw new Error("Ort nicht gefunden");
                const [lon, lat] = [gData[0].lon, gData[0].lat];

                // 2. API Parameter vorbereiten
                let body = {
                    coordinates: [[lon, lat]],
                    options: { 
                        round_trip: { length: dist * 1000, seed: Math.floor(Math.random() * 9999) }
                    },
                    elevation: true
                };

                // Asphalt Filter hinzufügen
                if (surface === "asphalt") {
                    body.options.avoid_features = ["unpavedroads"];
                }

                // 3. API Abfrage
                const response = await fetch('https://api.openrouteservice.org/v2/directions/cycling-road/geojson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': key },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if (!data.features) throw new Error("API Limit oder falscher Key");

                const route = data.features[0];
                const summary = route.properties.summary;
                
                // FIX: Höhenmeter sicher auslesen (ascent oder aus Koordinaten berechnen)
                let hm = summary.ascent || 0;
                
                // Falls Hm trotzdem 0 oder NaN sind, manuell kalkulieren
                if (!hm || isNaN(hm)) {
                    const coords = route.geometry.coordinates;
                    let calculatedAscent = 0;
                    for (let i = 1; i < coords.length; i++) {
                        let diff = coords[i][2] - coords[i-1][2];
                        if (diff > 0) calculatedAscent += diff;
                    }
                    hm = calculatedAscent;
                }

                // Höhenmeter Check
                if (hm > maxHm && attempt < 5) {
                    statusLabel.innerText = `Hügelig (${Math.round(hm)}m)... neuer Versuch...`;
                    return setTimeout(generate, 200);
                }

                statusLabel.innerText = "Strecke gefunden!";
                renderRoute(data, hm);

            } catch (e) {
                alert("Fehler: " + e.message);
                statusLabel.innerText = "";
            }
        }

        function renderRoute(data, hm) {
            currentGeoJSON = data;
            const summary = data.features[0].properties.summary;
            const coords = data.features[0].geometry.coordinates;

            // RICHTUNG ANZEIGEN: Ant-Path verwenden
            // Diese Linie "bewegt" sich in Fahrtrichtung
            routeLayer = L.polyline.antPath(coords.map(c => [c[1], c[0]]), {
                "delay": 2000,
                "dashArray": [10, 20],
                "weight": 6,
                "color": "#3b82f6",
                "pulseColor": "#ffffff",
                "paused": false,
                "reverse": false,
                "hardwareAccelerated": true
            }).addTo(map);

            map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

            // Stats anzeigen
            document.getElementById('distDisplay').innerText = (summary.distance / 1000).toFixed(1) + " km";
            document.getElementById('elevDisplay').innerText = Math.round(hm) + " Hm";
            document.getElementById('results').classList.remove('hidden');

            renderChart(coords);
        }

        function renderChart(coords) {
            const elevData = coords.map(c => c[2]);
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('elevationChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: elevData.map((_, i) => i),
                    datasets: [{
                        data: elevData,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { ticks: { color: '#64748b' }, grid: { color: '#334155' } }
                    }
                }
            });
        }

        function downloadGPX() {
            const gpx = togpx(currentGeoJSON);
            const blob = new Blob([gpx], {type: 'application/gpx+xml'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "meine_rennrad_tour.gpx";
            a.click();
        }
    </script>
</body>
</html>
