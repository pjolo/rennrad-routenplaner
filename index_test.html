<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadBike Route Generator & Elevation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/togpx/togpx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-5xl mx-auto p-4 md:p-6">
        <header class="text-center py-6">
            <h1 class="text-3xl md:text-4xl font-extrabold text-blue-500 tracking-tight">🚴‍♂️ Route-Roulette Pro</h1>
            <p class="text-gray-400 mt-2">Zufällige Rennrad-Touren mit Höhenprofil (Flach-Garantie)</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">API Key (ORS)</label>
                    <input id="apiKey" type="password" placeholder="Dein ORS Key" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Startadresse</label>
                    <input id="startAddr" type="text" placeholder="z.B. Berlin, Schlossplatz" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Max. Distanz (km)</label>
                    <input id="maxDist" type="number" value="60" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Max. Hm (Toleranz)</label>
                    <input id="maxElev" type="number" value="300" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none transition">
                </div>
            </div>

            <button id="generateBtn" onclick="generateRoute()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                <span>Neue Strecke würfeln</span> 🎲
            </button>
        </div>

        <div id="errorBox" class="hidden bg-red-900/50 border border-red-700 text-red-200 p-4 rounded-lg mb-6 text-center font-medium"></div>

        <div id="map" class="h-[400px] md:h-[500px] w-full rounded-xl border border-gray-700 shadow-inner z-0"></div>

        <div id="resultsArea" class="hidden space-y-6 mt-6">
            <div class="bg-gray-800 p-5 rounded-xl border border-blue-900/50 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div>
                    <h3 class="font-bold text-xl text-blue-400">Strecke gefunden!</h3>
                    <p id="stats" class="text-gray-300 text-base mt-1"></p>
                </div>
                <button onclick="downloadGPX()" class="w-full sm:w-auto bg-green-600 hover:bg-green-500 px-8 py-3 rounded-lg font-bold text-white transition shadow-md active:scale-95 flex items-center justify-center gap-2">
                    💾 <span>GPX Exportieren</span>
                </button>
            </div>

            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                <h3 class="font-bold text-lg text-gray-100 mb-4 flex items-center gap-2">🏔️ <span>Höhenprofil</span></h3>
                <div class="h-40 w-full">
                    <canvas id="elevationChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Globale Variablen ---
        let map = L.map('map', { zoomControl: true }).setView([51.1657, 10.4515], 6);
        let currentRouteGeoJSON = null;
        let routeLayer = null;
        let elevationChartInstance = null; // Für Zerstörung/Neuerstellung des Charts

        // --- Karten-Initialisierung (Fix: Standard OSM) ---
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Positioniere Zoom-Buttons um, damit sie nicht stören (optional)
        map.zoomControl.setPosition('bottomright');


        async function generateRoute() {
            const btn = document.getElementById('generateBtn');
            const errorBox = document.getElementById('errorBox');
            const resultsArea = document.getElementById('resultsArea');
            
            // UI Reset
            errorBox.classList.add('hidden');
            errorBox.innerText = "";
            resultsArea.classList.add('hidden');
            if(routeLayer) map.removeLayer(routeLayer);
            btn.innerHTML = "<span>Berechne...</span> <span class='animate-spin'>⏳</span>";
            btn.disabled = true;

            const key = document.getElementById('apiKey').value;
            const addr = document.getElementById('startAddr').value;
            const dist = document.getElementById('maxDist').value;
            const maxHm = document.getElementById('maxElev').value;

            if (!key || !addr || !dist || !maxHm) {
                showError("Bitte alle Felder ausfüllen (inkl. API Key).");
                resetBtn();
                return;
            }

            try {
                // 1. Geocoding
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
                const geoData = await geoRes.json();
                if (geoData.length === 0) throw new Error("Startort wurde nicht gefunden.");
                const lon = geoData[0].lon;
                const lat = geoData[0].lat;

                // 2. API Call an OpenRouteService (Round Trip)
                const randomSeed = Math.floor(Math.random() * 9999); // Mehr Zufall
                const response = await fetch('https://api.openrouteservice.org/v2/directions/cycling-road/geojson', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': key
                    },
                    body: JSON.stringify({
                        coordinates: [[lon, lat]],
                        options: {
                            round_trip: {
                                length: dist * 1000, // km zu m
                                seed: randomSeed
                            },
                            avoid_features: ["highways", "tollways"] // Zusätzliche Sicherheit
                        },
                        elevation: true // WICHTIG für Höhenprofil
                    })
                });

                if(!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "Fehler bei der Routenberechnung.");
                }

                const data = await response.json();
                if (!data.features || data.features.length === 0) throw new Error("Keine passende Route gefunden.");

                const route = data.features[0];
                const summary = route.properties.summary;
                const actualHm = summary.ascent;

                // 3. Höhenmeter-Check & Rekursion falls zu bergig
                if (actualHm > maxHm) {
                    console.log(`Route ignoriert: ${Math.round(actualHm)}m Hm > ${maxHm}m Limit. Neuer Versuch...`);
                    // Ein kleiner Trick, um Endlosschleifen zu verhindern: Wir rufen die Funktion erneut auf.
                    // Da der 'seed' zufällig ist, kommt eine andere Strecke.
                    return generateRoute(); 
                }

                // 4. Erfolg: Anzeigen
                displayRouteSuccess(data, summary);

            } catch (err) {
                showError(err.message);
            } finally {
                resetBtn();
            }
        }

        function displayRouteSuccess(data, summary) {
            currentRouteGeoJSON = data;
            
            // Auf Karte anzeigen
            routeLayer = L.geoJSON(data, {
                style: { color: '#3b82f6', weight: 5, opacity: 0.85 }
            }).addTo(map);
            
            // Karte auf Route zoomen
            map.fitBounds(routeLayer.getBounds(), {padding: [20, 20]});
            
            // Stats Text update
            document.getElementById('stats').innerHTML = 
                `Distanz: <b>${(summary.distance / 1000).toFixed(1)} km</b> | ` +
                `Höhenmeter: <b class="text-green-400">${Math
