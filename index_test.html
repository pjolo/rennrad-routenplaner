<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadBike Route Generator v4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Sicherstellen, dass die Karte wirklich Platz wegnimmt */
        #map { 
            height: 500px; 
            width: 100%; 
            background: #242424; /* Platzhalter-Farbe */
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-extrabold text-blue-500 italic">ROUTE ROULETTE</h1>
            <p class="text-gray-400">Rennrad-Touren | Flach & Sicher</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-6 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ORS API KEY</label>
                    <input id="apiKey" type="password" placeholder="Hier Key einfügen" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-white focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">STARTORT</label>
                    <input id="startAddr" type="text" placeholder="z.B. Hamburg" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-white focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">DISTANZ (KM)</label>
                    <input id="maxDist" type="number" value="50" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">MAX. HÖHENMETER</label>
                    <input id="maxElev" type="number" value="300" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-white">
                </div>
            </div>

            <button onclick="startProcess()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-lg transition shadow-lg uppercase tracking-widest">
                Strecke berechnen 🎲
            </button>
            <div id="status" class="mt-4 text-center text-sm font-mono text-blue-400 hidden"></div>
        </div>

        <div id="map"></div>

        <div id="results" class="hidden mt-6 space-y-6">
            <div class="bg-gray-800 p-4 rounded-xl border border-blue-500/30 flex justify-between items-center">
                <div id="statLabel" class="text-lg font-bold"></div>
                <button onclick="downloadGPX()" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded font-bold uppercase text-xs">GPX Download</button>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <canvas id="elevationChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/togpx/togpx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // 1. Karte sofort beim Laden initialisieren
        let map = L.map('map').setView([51.16, 10.45], 6);
        
        // Google Maps-ähnlicher Style (CartoDB Voyager)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let routeLayer, chartInstance, currentData;
        let attemptCount = 0;

        function startProcess() {
            attemptCount = 0;
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            if (routeLayer) map.removeLayer(routeLayer);
            generate();
        }

        async function generate() {
            attemptCount++;
            const key = document.getElementById('apiKey').value;
            const addr = document.getElementById('startAddr').value;
            const dist = document.getElementById('maxDist').value;
            const maxHm = parseInt(document.getElementById('maxElev').value);
            const status = document.getElementById('status');

            if (!key) return alert("Bitte ORS API Key eingeben!");

            status.innerText = `[Versuch ${attemptCount}] Suche Route...`;

            try {
                // Geocoding
                const gRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
                const gData = await gRes.json();
                if (gData.length === 0) throw new Error("Ort nicht gefunden");
                const [lon, lat] = [gData[0].lon, gData[0].lat];

                // API Call
                const response = await fetch('https://api.openrouteservice.org/v2/directions/cycling-road/geojson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': key },
                    body: JSON.stringify({
                        coordinates: [[lon, lat]],
                        options: { round_trip: { length: dist * 1000, seed: Math.floor(Math.random() * 9999) } },
                        elevation: true
                    })
                });

                const data = await response.json();
                const route = data.features[0];
                const hm = route.properties.summary.ascent;

                // Check Höhenmeter
                if (hm > maxHm && attemptCount < 5) {
                    status.innerText = `Route zu hügelig (${Math.round(hm)}m)... neuer Versuch...`;
                    return setTimeout(generate, 300);
                }

                status.innerText = "Fertig!";
                showRoute(data);

            } catch (e) {
                alert("Fehler: " + e.message);
                status.innerText = "";
            }
        }

        function showRoute(data) {
            currentData = data;
            const s = data.features[0].properties.summary;
            
            routeLayer = L.geoJSON(data, { style: { color: '#3b82f6', weight: 6, opacity: 0.9 } }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            document.getElementById('statLabel').innerHTML = `${(s.distance/1000).toFixed(1)} km | <span class="text-green-400">${Math.round(s.ascent)} Hm</span>`;
            document.getElementById('results').classList.remove('hidden');
            
            drawChart(data.features[0].geometry.coordinates);
        }

        function drawChart(coords) {
            const elevs = coords.map(c => c[2]);
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('elevationChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: elevs.map((_, i) => i),
                    datasets: [{ label: 'Meter', data: elevs, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', pointRadius: 0, borderWidth: 2 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { ticks: { color: '#9ca3af' }, grid: { color: '#374151' } } }
                }
            });
        }

        function downloadGPX() {
            const gpx = togpx(currentData);
            const blob = new Blob([gpx], {type: 'application/gpx+xml'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "tour.gpx";
            a.click();
        }
    </script>
</body>
</html>
