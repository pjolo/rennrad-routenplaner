<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadBike Route Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/togpx/togpx.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-5xl mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">🚴‍♂️ Rennrad Route-Roulette</h1>
            <p class="text-gray-400 mt-2">Zufällige Rundtouren ohne Autobahn-Stress</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">API Key (ORS)</label>
                    <input id="apiKey" type="password" placeholder="Dein ORS Key" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Startadresse</label>
                    <input id="startAddr" type="text" placeholder="z.B. Berlin, Schlossplatz" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Max. Distanz (km)</label>
                    <input id="maxDist" type="number" value="50" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Max. Hm (Toleranz)</label>
                    <input id="maxElev" type="number" value="300" class="w-full bg-gray-900 border border-gray-600 p-2 rounded focus:border-blue-500 outline-none">
                </div>
            </div>

            <button onclick="generateRoute()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg active:scale-95">
                Neue Strecke würfeln 🎲
            </button>
        </div>

        <div id="map" class="h-[500px] w-full rounded-xl border border-gray-700 shadow-inner"></div>

        <div id="resultCard" class="hidden mt-6 bg-gray-800 p-4 rounded-xl border border-blue-900/50 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg text-blue-400">Strecke gefunden!</h3>
                <p id="stats" class="text-gray-300"></p>
            </div>
            <button onclick="downloadGPX()" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded font-bold text-white transition">
                GPX Exportieren 💾
            </button>
        </div>
    </div>

    <script>
        let map = L.map('map').setView([51.1657, 10.4515], 6);
        L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let currentRouteGeoJSON = null;
        let routeLayer = null;

        async function generateRoute() {
            const key = document.getElementById('apiKey').value;
            const addr = document.getElementById('startAddr').value;
            const dist = document.getElementById('maxDist').value;
            const maxHm = document.getElementById('maxElev').value;

            if (!key || !addr) return alert("Bitte API Key und Startort eingeben!");

            try {
                // 1. Geocoding: Adresse -> Koordinaten
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
                const geoData = await geoRes.json();
                if (geoData.length === 0) throw new Error("Ort nicht gefunden");
                const lon = geoData[0].lon;
                const lat = geoData[0].lat;

                // 2. OpenRouteService Round Trip Call
                const randomSeed = Math.floor(Math.random() * 1000);
                const response = await fetch('https://api.openrouteservice.org/v2/directions/cycling-road/geojson', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': key
                    },
                    body: JSON.stringify({
                        coordinates: [[lon, lat]],
                        options: {
                            round_trip: {
                                length: dist * 1000,
                                seed: randomSeed
                            }
                        },
                        elevation: true
                    })
                });

                const data = await response.json();
                if (!data.features) throw new Error("Keine Route gefunden");

                const route = data.features[0];
                const actualHm = route.properties.summary.ascent;

                // 3. Höhenmeter-Check (ORS Roundtrip versucht es, aber wir validieren)
                if (actualHm > maxHm) {
                    console.log(`Route zu bergig (${actualHm}m). Versuche es erneut...`);
                    return generateRoute(); // Rekursiver Versuch für eine flachere Strecke
                }

                displayRoute(data, route.properties.summary);

            } catch (err) {
                alert("Fehler: " + err.message);
            }
        }

        function displayRoute(data, summary) {
            if (routeLayer) map.removeLayer(routeLayer);
            
            currentRouteGeoJSON = data;
            routeLayer = L.geoJSON(data, {
                style: { color: '#3b82f6', weight: 5, opacity: 0.8 }
            }).addTo(map);
            
            map.fitBounds(routeLayer.getBounds());
            
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('stats').innerHTML = 
                `Distanz: <b>${(summary.distance / 1000).toFixed(1)} km</b> | ` +
                `Höhenmeter: <b>${Math.round(summary.ascent)} m</b>`;
        }

        function downloadGPX() {
            if (!currentRouteGeoJSON) return;
            const gpx = togpx(currentRouteGeoJSON);
            const blob = new Blob([gpx], {type: 'application/gpx+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rennrad_tour_${Math.round(Math.random()*1000)}.gpx`;
            a.click();
        }
    </script>
</body>
</html>
